name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-test:
    name: Build WASM & Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build WASM
        run: make wasm

      - name: Verify WASM Build Is Committed
        run: |
          git diff --exit-code plugin/wasm/ || (echo "WASM artifacts are out of date! Please run 'make wasm' and commit the changes locally before tagging." && exit 1)

      - name: Run Tests
        run: cargo test

      - name: Run Clippy
        run: cargo clippy -- -D warnings

      - name: Package Plugin
        run: |
          cd plugin
          # We don't need node_modules or local locks in the release artifact
          rm -rf node_modules bun.lockb package-lock.json
          tar czvf ../openagent-harness-plugin.tar.gz .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-bundle
          path: openagent-harness-plugin.tar.gz

  release:
    name: Create GitHub Release
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: plugin-bundle
          path: .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: openagent-harness-plugin.tar.gz
          generate_release_notes: true
